<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Registruj se</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="registerForm" (ngSubmit)="onRegister()">

    <ion-grid>
      <ion-row>
        <ion-col size="6" size-sm="3" offset-sm="3">
          <ion-item>
            <ion-input type="text" label="Name" labelPlacement="floating" placeholder="Ime" required
              formControlName="name">
            </ion-input>
          </ion-item>
        </ion-col>
        <ion-col size="6" size-sm="3">
          <ion-item>
            <ion-input type="text" label="Surname" labelPlacement="floating" placeholder="Prezime" required
              formControlName="surname">
            </ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item>
            <ion-input type="email" formControlName="email" label="Email" labelPlacement="floating"> </ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      @if(registerForm.get('email')!.invalid && registerForm.get('email')!.touched) {
      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <p>Should be a valid email address.</p>
        </ion-col>
      </ion-row>
      }
      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <ion-item>
            <ion-input type="password" formControlName="password" label="Password"
              labelPlacement="floating"></ion-input>
          </ion-item>
        </ion-col>
      </ion-row>

      @if(registerForm.get('password')!.invalid && registerForm.get('password')!.touched) {
      <ion-row>
        <ion-col size-sm="6" offset-sm="3">
          <p>Should be minimum 7 characters long.</p>
        </ion-col>
      </ion-row>
      }




      <ion-row>
        <ion-col size="12" size-sm="6" offset-sm="3">
          <ion-button type="submit" color="primary" shape="round" expand="block" class="ion-margin-top">
            Registruj se
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
