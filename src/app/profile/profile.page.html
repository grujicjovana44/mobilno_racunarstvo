<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title style="font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
      MY PROFILE
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div style="text-align: center; margin-bottom: 20px;">
    <ion-avatar style="width: 100px; height: 100px; margin: 0 auto; border: 3px solid #f4c2c2;">
      <ion-icon name="person-circle" style="font-size: 100px; color: #d7abab;"></ion-icon>
    </ion-avatar>
    <h2 style="font-weight: bold; margin-top: 10px;">Jovana Grujić</h2>
  </div>

  <ion-list lines="full">
    <ion-item>
      <ion-icon name="mail-outline" slot="start" style="color: #d7abab;"></ion-icon>
      <ion-label>
        <p>Email</p>
        <h3 style="font-weight: 500;">jovana@gmail.com</h3>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="calendar-outline" slot="start" style="color: #d7abab;"></ion-icon>
      <ion-label>
        <p>Datum rođenja</p>
        <h3 style="font-weight: 500;">04.04.2003.</h3>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="transgender-outline" slot="start" style="color: #d7abab;"></ion-icon>
      <ion-label>
        <p>Pol</p>
        <h3 style="font-weight: 500;">Ženski</h3>
      </ion-label>
    </ion-item>

    <ion-item>
      <ion-icon name="location-outline" slot="start" style="color: #d7abab;"></ion-icon>
      <ion-label>
        <p>Grad</p>
        <h3 style="font-weight: 500;">Beograd</h3>
      </ion-label>
    </ion-item>
  </ion-list>

  <div style="margin-top: 30px;">
    <ion-button expand="block" fill="clear" color="danger" style="margin-top: 10px; font-weight: bold;"
    (click)="logout()">
      ODJAVI SE
    </ion-button>
  </div>
</ion-content>
