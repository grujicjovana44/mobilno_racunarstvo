<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Prijavi se</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form #logInForm="ngForm" (ngSubmit)="prijaviSe(logInForm)">
    <ion-grid>
      <ion-row class="ion-justify-content-center">
        <ion-col size="12" class="ion-text-center">
          <ion-icon name="person-circle-outline" color="primary" style="font-size: 80px;"></ion-icon>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-list lines="full">

            <ion-item>
              <ion-input type="email" label="Email" labelPlacement="floating" #email="ngModel" ngModel email required
                name="email">
              </ion-input>
            </ion-item>

            @if(email.invalid && email.touched) {
            <ion-item lines="none">
              <ion-label>
                Should be a valid email address.
              </ion-label>
            </ion-item>
            }

            <ion-item>
              <ion-input type="password" label="Password" labelPlacement="floating" ngModel minlength="7" required
                #password="ngModel" name="password"></ion-input>
            </ion-item>

            @if(password.invalid && password.touched) {
            <ion-item lines="none">
              <ion-label>
                Should be minimum 7 characters long.
              </ion-label>
            </ion-item>
            }


          </ion-list>
        </ion-col>
      </ion-row>

      <ion-row>
        <ion-col>
          <ion-button type="submit" [disabled]="!logInForm.valid" color="primary" expand="block" shape="round"
            class="ion-margin-top">
            Prijavi se
          </ion-button>

          <ion-button fill="clear" color="medium" expand="block" size="small" type="button"
            (click)="idiNaRegistraciju()">
            Nemate nalog? Registrujte se
          </ion-button>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
