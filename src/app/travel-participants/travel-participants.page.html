<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/travel"></ion-back-button>
    </ion-buttons>
    <ion-title style="font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
      Učesnici putovanja
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Info o putovanju -->
  <div *ngIf="travel" style="background: #f9f0f0; border-radius: 10px; padding: 12px; margin-bottom: 16px;">
    <h3 style="margin: 0; font-weight: bold;">{{ travel.grad }}, {{ travel.drzava }}</h3>
    <p style="margin: 4px 0 0; color: #666;">📅 {{ travel.datumOd }} - {{ travel.datumDo }}</p>
  </div>

  <!-- Prijatelji sa toggleom -->
  <ion-list-header>
    <ion-label style="font-weight: bold;">Moji prijatelji</ion-label>
  </ion-list-header>

  <div *ngIf="mojiPrijatelji.length === 0" class="ion-text-center ion-padding">
    <p style="color: #888;">Nemaš dodanih prijatelja.</p>
  </div>

  <ion-list>
    <ion-item *ngFor="let friend of mojiPrijatelji">
      <ion-avatar slot="start">
        <ion-icon name="person-circle" style="font-size: 40px; color: #d7abab;"></ion-icon>
      </ion-avatar>
      <ion-label>
        <h2>{{ friend.name }}</h2>
        <p>{{ friend.email }}</p>
      </ion-label>
      <ion-button
        slot="end"
        [color]="isParticipant(friend.id) ? 'danger' : 'primary'"
        fill="outline"
        size="small"
        (click)="toggleParticipant(friend)">
        {{ isParticipant(friend.id) ? 'Ukloni' : 'Dodaj' }}
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
